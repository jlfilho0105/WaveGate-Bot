# ============================================================
# WaveGate Bot - OKX Directional
# Markov diario + filtro H1 + WaveTrend M5 (LONG/SHORT)
# ============================================================

exchange: "okx"
instrument_type: "SWAP"
td_mode: "cross"
okx_simulated_trading: false

# --- Estrategia ---
leverage: 3
target_pct: 0.006        # 0.6% de alvo
stop_pct: 0.003          # 0.3% de stop
min_rr: 1.8
min_conditions: 4
allow_long: true
allow_short: true
trade_sideways: false

# --- WaveTrend Oscillator ---
wt_n1: 10
wt_n2: 21
wt_oversold: -40
wt_overbought: 45

# --- Filtros M5 ---
body_ratio_min: 0.50
volume_factor: 1.5

# --- Filtro H1 ---
h1_enabled: true
h1_ema_fast: 21
h1_ema_slow: 55
h1_macd_confirm: true

# --- Markov diario ---
markov_window: 20
markov_threshold: 0.05
markov_min_train: 30

# --- Indicadores ---
ema_periods: [9, 21, 55]
ma_periods: [5, 10, 30, 60]
bb_period: 20
bb_std: 2
macd_fast: 12
macd_slow: 26
macd_signal: 9
rsi_period: 14
volume_ma_period: 20

# --- Universo OKX validado em backtest 180d ---
# Core inicial: PF > 2, retorno positivo e consistencia mensal aceitavel.
symbols:
  - BNB-USDT-SWAP
  - SAHARA-USDT-SWAP
  - ETH-USDT-SWAP
  - ADA-USDT-SWAP
  - DOGE-USDT-SWAP
  - AVAX-USDT-SWAP
  - SUI-USDT-SWAP

# Reserva para validacao futura:
# XPL-USDT-SWAP, HYPE-USDT-SWAP, ONDO-USDT-SWAP, NEAR-USDT-SWAP

# --- Gestao de risco ---
initial_equity_usdt: 10000.0
risk_per_trade_pct: 0.5       # conservador para inicio em OKX
max_open_positions: 3
daily_loss_limit_pct: 2.0

# --- Dados ---
buffer_size: 1000             # necessario para filtro H1 EMA55
history_days: 180
timeframe: "5m"

# --- Monitoramento ---
monitor_update_pct: 25
max_duration_min: 120

# --- Resultados ---
results_dir: "backtest/results"
